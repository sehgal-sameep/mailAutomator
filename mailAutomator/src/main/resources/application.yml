server:
  port: 8082

spring:
  application:
    name: mailAutomator

  # ─── Gmail SMTP (App Password) ─────────────────────────────────────────────
  # Generate an App Password at: myaccount.google.com/apppasswords
  # (requires 2-Step Verification to be enabled on the account)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_SENDER_EMAIL:your-email@gmail.com}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ─── Google Sheets (Service Account) ─────────────────────────────────────────
# sheetId and tabName are now passed per-request via the API payload.
# Only structural config lives here.
google:
  sheets:
    range-suffix: "!A:F"
    # Path to the service account JSON key file (downloaded from Google Cloud Console)
    service-account-key-path: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:google-service-account.json}

# ─── Gmail sender identity ────────────────────────────────────────────────────
# Used as the From: header. Must match spring.mail.username.
gmail:
  sender-email: ${GMAIL_SENDER_EMAIL:your-email@gmail.com}

# ─── Email Content ────────────────────────────────────────────────────────────
# subject and template are selected dynamically based on templateType in the request payload.
# companyName, jobId, jobLink, sheetId, tabName, templateType are all passed per-request.
email:
  referral-template-path: ${REFERRAL_TEMPLATE_PATH:templates/referral-email-template.txt}
  internal-opening-template-path: ${INTERNAL_OPENING_TEMPLATE_PATH:templates/internal-opening-email-template.txt}
  resume-path: ${RESUME_PATH:resume_sameep_sehgal.pdf}
  cover-letter-path: ${COVER_LETTER_PATH:cover_letter_sameep_sehgal.pdf}
  # Set to true to preview recipients in logs without sending any emails
  dry-run: ${DRY_RUN:false}
